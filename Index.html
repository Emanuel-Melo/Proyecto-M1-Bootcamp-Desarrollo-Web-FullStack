<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProyectoM1_EmanuelFlórez</title>
    <link rel="stylesheet" href="./style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <span>Since: 2026</span>
        <h1>PalettePro</h1>
        <h2>Donde el color no tiene límites</h2>
        <nav>
            <ul>
                <a href="#pGenerador">¡A generar!</a>
            </ul>
        </nav> 
        <div class="Space"></div>
    </header>
    <main>
        <section>
            <h3>¡Atrévete a descubrir tu próxima combinación favorita!</h3>
            <div class="contenedor">
                <div class="item">item 1</div>
                <div class="item">item 2</div>
                <div class="item">item 3</div>
                <div class="item">item 4</div>
                <div class="item">item 5</div>
                <div class="item">item 6</div>
                <div class="item">item 7</div>
                <div class="item">item 8</div>
                <div class="item">item 9</div>
            </div>
            <div>
                <label id="pGenerador">Seleccione la cantidad de colores:</label>
                <select>
                        <option>6 colores</option>
                        <option>8 colores</option>
                        <option>9 colores</option>
                </select>
            </div>

            <div class="toggle">
                <input type="radio" name="mode" id="hex" checked>
                <input type="radio" name="mode" id="hsl">

            <div class="slider"></div>

                <label for="hex">HEX</label>
                <label for="hsl">HSL</label>
            </div>
            <button>Genera tu nueva paleta</button>
            <div class="Space"></div>
        </section>
    </main>
</body>
</html>
